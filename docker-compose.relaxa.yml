services:
  app:
    container_name: relaxa-support-app
    volumes:
      - ./docker/relaxa/php-fpm-performance.conf:/usr/local/etc/php-fpm.d/zz-relaxa-performance.conf:ro
      - ./docker/relaxa/php-performance.ini:/usr/local/etc/php/conf.d/zz-relaxa-performance.ini:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SUPPORT_APP_PORT:-55610}:9000"

  pgdb:
    container_name: relaxa-support-postgres
    ports:
      - "127.0.0.1:${SUPPORT_PG_PORT:-55611}:5432"

  nginx:
    container_name: relaxa-support-nginx
    volumes:
      - ./docker/relaxa/nginx-local.conf:/etc/nginx/conf.d/relaxa-local.conf:ro
    ports: !override
      - "${SUPPORT_HTTP_PORT:-55612}:80"

  queue:
    container_name: relaxa-support-queue
    extra_hosts:
      - "host.docker.internal:host-gateway"

  telegram_poll:
    build: .
    container_name: relaxa-support-telegram-poll
    restart: always
    depends_on:
      - app
      - queue
    env_file:
      - .env
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan telegram:poll-updates
    networks:
      - pet
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  scheduler:
    container_name: relaxa-support-scheduler
    extra_hosts:
      - "host.docker.internal:host-gateway"


