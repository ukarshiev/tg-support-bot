services:
    redis:
        image: redis:7.4.9-alpine@sha256:9de71018be8413f419688ac34e19dbac432d1c6d9593d2ded99a82eebefeb18f
        container_name: tg_support_redis
        restart: always
        env_file:
            - .env
        command: >-
            sh -lc 'exec redis-server
            --appendonly yes
            --appendfsync everysec
            --maxmemory 256mb
            --maxmemory-policy noeviction
            --requirepass "$$REDIS_PASSWORD"'
        healthcheck:
            test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 5s
        volumes:
            - redisdata:/data
        networks:
            - pet

    app:
        build: .
        container_name: pet
        user: "33:33"
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "php -v >/dev/null && php artisan about --only=environment >/dev/null"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        depends_on:
            assets_init:
                condition: service_completed_successfully
            pgdb:
                condition: service_healthy
            redis:
                condition: service_healthy
        env_file:
            - .env
        working_dir: /var/www/
        command: php-fpm
        volumes:
            - app_public:/var/www/public
            - app_storage:/var/www/storage
            - app_bootstrap_cache:/var/www/bootstrap/cache
        networks:
            - pet
        dns:
            - 8.8.8.8
            - 1.1.1.1

    assets_init:
        build: .
        user: root
        restart: "no"
        command: sh -lc 'rm -rf /target/* && cp -a /var/www_public_image/. /target/ && chown -R 33:33 /target'
        volumes:
            - app_public:/target
        networks:
            - pet

    pgdb:
        container_name: pgdb
        image: postgres:18.4@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
        tty: true
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        environment:
            - POSTGRES_DB=${DB_DATABASE}
            - POSTGRES_USER=${DB_USERNAME}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
        ports:
            - ${PGDB_PORT}
        volumes:
            - pgdata:/var/lib/postgresql
        networks:
            - pet

    nginx:
        image: nginx:1.31.2@sha256:ec4ed8b5299e5e90694af7750eb6dffd2627317d30544d056b0371f8082f7bce
        container_name: nginx
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1 && curl -fsS -H 'Host: ${MAIN_DOMAIN}' 'http://127.0.0.1/up' >/dev/null"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s
        ports:
            - ${NGINX_PORT}
            - "443:443"
        volumes:
            - app_public:/var/www/public:ro
            - ./docker/nginx:/etc/nginx/conf.d
            - /etc/letsencrypt:/etc/letsencrypt:ro
            - ./docker/nginx/logs:/var/log/nginx
        environment:
            - TZ=${SYSTEM_TIMEZONE}
        depends_on:
            pgdb:
                condition: service_healthy
            app:
                condition: service_healthy
            reverb:
                condition: service_healthy
        networks:
            - pet

    queue:
        build: .
        container_name: laravel_queue
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "php artisan horizon:status | grep -qi running"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        depends_on:
            app:
                condition: service_healthy
            redis:
                condition: service_healthy
        env_file:
            - .env
        working_dir: /var/www
        volumes:
            - app_public:/var/www/public
            - app_storage:/var/www/storage
            - app_bootstrap_cache:/var/www/bootstrap/cache
        command: php artisan horizon
        networks:
            - pet
        dns:
            - 8.8.8.8
            - 1.1.1.1

    reverb:
        build: .
        container_name: laravel_reverb
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\",8080,$$e,$$m,1); exit($$s?0:1);'"]
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 20s
        depends_on:
            app:
                condition: service_healthy
            redis:
                condition: service_healthy
        env_file:
            - .env
        working_dir: /var/www
        volumes:
            - app_storage:/var/www/storage
            - app_bootstrap_cache:/var/www/bootstrap/cache
        command: php artisan reverb:start --host=0.0.0.0 --port=8080
        networks:
            - pet

    scheduler:
        build: .
        container_name: laravel_scheduler
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "php -v >/dev/null && php artisan about --only=environment >/dev/null"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        depends_on:
            app:
                condition: service_healthy
        env_file:
            - .env
        working_dir: /var/www
        volumes:
            - app_public:/var/www/public
            - app_storage:/var/www/storage
            - app_bootstrap_cache:/var/www/bootstrap/cache
        command: php artisan schedule:work
        networks:
            - pet
        dns:
            - 8.8.8.8
            - 1.1.1.1

    telegram_poller:
        build: .
        container_name: telegram_poller
        restart: always
        depends_on:
            app:
                condition: service_healthy
            nginx:
                condition: service_healthy
            queue:
                condition: service_healthy
        env_file:
            - .env
        working_dir: /var/www
        volumes:
            - app_public:/var/www/public
            - app_storage:/var/www/storage
            - app_bootstrap_cache:/var/www/bootstrap/cache
        command: php artisan telegram:poll-updates --sleep=1 --timeout=10
        networks:
            - pet
        dns:
            - 8.8.8.8
            - 1.1.1.1

    ai_telegram_poller:
        build: .
        container_name: ai_telegram_poller
        restart: always
        depends_on:
            app:
                condition: service_healthy
            nginx:
                condition: service_healthy
            queue:
                condition: service_healthy
        env_file:
            - .env
        working_dir: /var/www
        volumes:
            - app_public:/var/www/public
            - app_storage:/var/www/storage
            - app_bootstrap_cache:/var/www/bootstrap/cache
        command: php artisan ai-bot:poll-updates --sleep=1 --timeout=25
        networks:
            - pet
        dns:
            - 8.8.8.8
            - 1.1.1.1
volumes:
    pgdata:
    redisdata:
    app_public:
    app_storage:
    app_bootstrap_cache:
networks:
    pet:
        driver: bridge
