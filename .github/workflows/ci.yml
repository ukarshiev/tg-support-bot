name: Laravel CI Optimized

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Hadolint
        run: |
          sudo wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint

      - name: Run Hadolint on Dockerfiles
        run: |
          DOCKERFILES=("Dockerfile")
          IGNORE_RULES="DL3008|DL3015"
          ERROR_FOUND=0

          for FILE in "${DOCKERFILES[@]}"; do
            if [[ ! -f "$FILE" ]]; then
              echo "⚠️ $FILE not found. Skipping."
              continue
            fi

            echo "🔍 Checking $FILE ..."

            output=$(hadolint "$FILE" 2>&1 | grep -vE "$IGNORE_RULES" || true)
            if [[ -n "$output" ]]; then
              echo "❌ Issues found in $FILE:"
              echo "$output"
              ERROR_FOUND=1
            else
              echo "✅ $FILE passed Hadolint checks!"
            fi
          done

          if [[ $ERROR_FOUND -eq 0 ]]; then
            echo "✅ All Dockerfiles passed Hadolint checks!"
          else
            echo "❌ Hadolint found issues in one or more Dockerfiles!"
            exit 1
          fi

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on scripts
        run: |
          ERROR_FOUND=0
          DIRS=("scripts" "docker/scripts")

          if [[ -f start.sh ]]; then
            shellcheck --severity=warning start.sh || ERROR_FOUND=1
          fi

          for DIR in "${DIRS[@]}"; do
            if [ ! -d "$DIR" ]; then
              echo "⚠️ Directory $DIR does not exist. Skipping."
              continue
            fi

            echo "ℹ️ Checking directory: $DIR"

            sh_files=$(find "$DIR" -type f -name "*.sh")
            if [ -z "$sh_files" ]; then
              echo "No .sh files found in $DIR"
              continue
            fi

            for file in $sh_files; do
              echo "ℹ️ Checking $file..."
              shellcheck --severity=warning "$file" || ERROR_FOUND=1
            done
          done

          if [[ $ERROR_FOUND -eq 0 ]]; then
            echo "✅ All shell scripts passed important ShellCheck checks!"
          else
            echo "❌ ShellCheck found important issues!"
            exit 1
          fi

  phpstan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "8.3"

      - name: Cache Composer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: |
          set -euo pipefail
          ERROR_FOUND=0

          if [ ! -f ".markdownlint.yml" ]; then
            echo "::error::Config file .markdownlint.yml not found"
            exit 1
          fi

          mapfile -t md_files < <(find . -type f -name "*.md" \
            -not -path "./node_modules/*" \
            -not -path "./_site/*" \
            -not -path "./vendor/*")

          if [ ${#md_files[@]} -eq 0 ]; then
            echo "⚠️ No .md files found. Skipping."
            exit 0
          fi

          for file in "${md_files[@]}"; do
            echo "ℹ️ Checking ${file#./}..."
            markdownlint "$file" || ERROR_FOUND=1
          done

          if [[ $ERROR_FOUND -eq 0 ]]; then
            echo "✅ All markdown files passed markdownlint checks!"
          else
            echo "❌ markdownlint found issues!"
            exit 1
          fi

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: |
          set -euo pipefail
          ERROR_FOUND=0

          if [ ! -f ".yamllint.yml" ]; then
            echo "::error::Config file .yamllint.yml not found"
            exit 1
          fi

          mapfile -t yaml_files < <(find . -type f \( -name "*.yml" -o -name "*.yaml" \) \
            -not -path "./_site/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" \
            -not -name ".yamllint.yml")

          if [ ${#yaml_files[@]} -eq 0 ]; then
            echo "⚠️ No YAML files found. Skipping."
            exit 0
          fi

          for file in "${yaml_files[@]}"; do
            echo "ℹ️ Checking ${file#./}..."
            yamllint "$file" || ERROR_FOUND=1
          done

          if [[ $ERROR_FOUND -eq 0 ]]; then
            echo "✅ All YAML files passed yamllint checks!"
          else
            echo "❌ yamllint found issues!"
            exit 1
          fi

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, sqlite, bcmath, curl, gd

      - name: Cache Composer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel with SQLite
        run: |
          cp .env.example .env
          php artisan key:generate
          # создаем файл базы для параллельных процессов
          touch database/testing.sqlite
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=${GITHUB_WORKSPACE}/database/testing.sqlite" >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests in parallel with isolation
        run: php artisan test

  postgres_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18.4-alpine3.24@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_DB: tg_support_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tg_support_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: tg_support_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_pgsql, bcmath, curl, gd
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Verify migrations and rollback
        run: |
          php artisan migrate:fresh --force
          php artisan migrate:rollback --step=999 --force
          php artisan migrate --force
      - name: Run PostgreSQL test suite
        run: php artisan test

  production_image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build production image
        run: docker build --tag tg-support-bot:ci .
      - name: Verify minimal non-root runtime
        run: |
          test "$(docker image inspect tg-support-bot:ci --format '{{.Config.User}}')" = "www-data"
          docker run --rm --network none tg-support-bot:ci sh -lc \
            '! command -v node && ! command -v npm && ! command -v composer && ! command -v git && test ! -d vendor/mockery'
      - name: Scan runtime image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c \
            image --exit-code 1 --ignore-unfixed --severity HIGH,CRITICAL \
            --scanners vuln --skip-version-check tg-support-bot:ci

  pint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "8.3"

      - name: Cache Composer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint (check only)
        run: ./vendor/bin/pint --test

  composer_validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "8.3"

      - name: Validate composer.json against composer.lock
        run: composer validate --strict --no-check-publish

  composer_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "8.3"

      - name: Cache Composer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Audit dependencies for known vulnerabilities
        run: composer audit --no-dev --abandoned=ignore

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          BASE="https://github.com/gitleaks/gitleaks/releases/download"
          FILE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "${BASE}/v${GITLEAKS_VERSION}/${FILE}" \
            | sudo tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: |
          set -euo pipefail

          echo "ℹ️ Running gitleaks on the repository..."

          if gitleaks detect --source . --no-banner --redact; then
            echo "✅ No secrets found"
          else
            echo "❌ gitleaks found potential secrets"
            exit 1
          fi

  vite_build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build front-end assets
        run: npm run build

  graphify_code_graph:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Graphify
        run: python -m pip install graphifyy

      - name: Build code graph
        run: graphify update . --no-cluster

      - name: Upload Graphify graph
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: graphify-code-graph
          path: graphify-out/
