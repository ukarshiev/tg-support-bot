name: Deploy to Server

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_sqlite, bcmath, curl, gd
      - name: Install and test
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          cp .env.example .env
          php artisan key:generate
          touch database/testing.sqlite
          DB_CONNECTION=sqlite DB_DATABASE="${GITHUB_WORKSPACE}/database/testing.sqlite" php artisan test
      - name: Verify production image
        run: docker build --tag tg-support-bot:${{ github.ref_name }} .

  deploy:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/tg-support-bot
            git fetch --all
            git checkout ${{ github.ref_name }}
            chmod +x start.sh
            ./start.sh
