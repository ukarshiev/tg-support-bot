# Mutagen project — sync the local working copy → remote server over SSH.
#
# Usage (run from the project root, where this file lives):
#   mutagen project start        # create the session(s) and begin syncing
#   mutagen sync monitor         # watch sync status / progress
#   mutagen sync list            # show sessions
#   mutagen project flush        # force-flush pending changes now
#   mutagen project terminate    # stop syncing and remove the session(s)
#
# BEFORE the first run, fill in the `beta` SSH endpoint below.
#   Format:  user@host:/absolute/remote/path
#   Custom SSH port / key:  configure it in ~/.ssh/config for `host` (Mutagen
#   uses your system SSH), e.g.
#       Host iliya-prod
#           HostName support.iliya-code.ru
#           User deploy
#           Port 22
#           IdentityFile ~/.ssh/id_ed25519
#   …then set beta to:  iliya-prod:/var/www/tg-support-bot

sync:
  defaults:
    # Local (alpha) is the source of truth; the TEST server (beta) becomes an
    # EXACT mirror of local — one-way-replica deletes anything on the server not
    # present locally (and not ignored below). The ignore list protects the
    # server's own runtime/data: .env, storage, vendor, node_modules, the live
    # Postgres data dir and the storage symlink.
    mode: "one-way-replica"

    ignore:
      vcs: true                 # skip .git
      paths:
        # Server keeps its own copies of these — do not push/clobber them.
        - "/.env"
        - "/.env.*"
        - "/vendor"
        - "/node_modules"
        - "/storage"
        - "/bootstrap/cache"
        # CRITICAL: live PostgreSQL data dir — syncing it corrupts the DB and
        # produces endless conflicts (it is .gitignored for the same reason).
        - "/docker/postgres"
        - "/docker/nginx/logs"
        # Server-managed, rendered nginx vhosts (with real domain + cert paths,
        # and any /telescope-style access rules). Replica must NOT touch them —
        # otherwise it deletes the live config and a reload kills the site. The
        # tracked `default.conf.template` still syncs; only rendered *.conf is
        # left to the server.
        - "/docker/nginx/*.conf"
        # Build artifacts / runtime symlinks (built or created on the server).
        - "/public/build"
        - "/public/hot"
        - "/public/storage"      # `php artisan storage:link` symlink (absolute → not portable)
        # Tooling caches / editor noise
        - "/.idea"
        - "/.claude"
        - "/.fleet"
        - "/.phpstan-error-count.json"
        - "/.phpunit.result.cache"
        - ".DS_Store"
        - "*.swp"

    # Files land on the server with sane web permissions.
    permissions:
      defaultFileMode: 0644
      defaultDirectoryMode: 0755

  # Single session: local working copy → server document root.
  code:
    alpha: "."
    beta: "root@45.80.69.244:/home/multichat"
