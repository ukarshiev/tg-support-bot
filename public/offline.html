<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B1F2E" />
    <title>Нет соединения — TG Support</title>
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            display: flex; align-items: center; justify-content: center;
            min-height: 100%; padding: 24px;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #F8F9FA; color: #1A1D26;
        }
        .card {
            width: 100%; max-width: 360px; text-align: center;
            background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 16px;
            padding: 32px 24px; box-shadow: 0 10px 30px rgba(0,0,0,.06);
        }
        .icon {
            width: 56px; height: 56px; margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 14px; background: #1B1F2E; color: #FFFFFF;
        }
        h1 { font-size: 18px; margin: 0 0 8px; }
        p { font-size: 14px; line-height: 1.5; color: #6B7280; margin: 0 0 20px; }
        button {
            appearance: none; border: none; cursor: pointer;
            background: #4F6EF7; color: #FFFFFF; font-size: 14px; font-weight: 600;
            padding: 10px 20px; border-radius: 10px; transition: opacity .15s;
        }
        button:hover { opacity: .9; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 1l22 22" /><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" /><path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
                <line x1="12" y1="20" x2="12.01" y2="20" />
            </svg>
        </div>
        <h1>Нет подключения к интернету</h1>
        <p>Похоже, пропала сеть. Проверьте соединение — рабочее место и обновления чатов снова заработают, как только связь восстановится.</p>
        <button type="button" onclick="location.reload()">Повторить</button>
    </div>
</body>
</html>
